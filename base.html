<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}TRAKORY{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0d0d0f;
      --surface: #16161a;
      --surface2: #1e1e24;
      --border: #2a2a35;
      --accent: #7c6af7;
      --accent2: #f76a6a;
      --accent3: #6af7c4;
      --text: #e8e8f0;
      --muted: #7a7a8c;
      --card-bg: #13131a;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
    }
    nav {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 60px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .nav-logo {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 1.4rem;
      color: var(--accent);
      text-decoration: none;
      letter-spacing: 2px;
    }
    .nav-logo span { color: var(--accent2); }
    .nav-links { display: flex; align-items: center; gap: 0.5rem; }
    .nav-links a {
      color: var(--muted);
      text-decoration: none;
      padding: 0.4rem 0.9rem;
      border-radius: 6px;
      font-size: 0.9rem;
      font-weight: 500;
      transition: all 0.2s;
    }
    .nav-links a:hover { color: var(--text); background: var(--surface2); }
    .nav-links a.active { color: var(--accent); }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.5rem 1.1rem;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 500;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      border: none;
      text-decoration: none;
      transition: all 0.2s;
    }
    .btn-primary { background: var(--accent); color: white; }
    .btn-primary:hover { background: #6b59e6; transform: translateY(-1px); }
    .btn-danger { background: #3a1a1a; color: var(--accent2); border: 1px solid #5a2a2a; }
    .btn-danger:hover { background: #4a2020; }
    .btn-ghost { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
    .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }
    .btn-sm { padding: 0.3rem 0.7rem; font-size: 0.82rem; }
    .container { max-width: 1200px; margin: 0 auto; padding: 2rem; }
    .messages { padding: 0.8rem 2rem; }
    .message {
      padding: 0.8rem 1.2rem;
      border-radius: 8px;
      margin-bottom: 0.5rem;
      font-size: 0.9rem;
    }
    .message.success { background: #0d2a1e; color: var(--accent3); border: 1px solid #1a4a33; }
    .message.error { background: #2a0d0d; color: var(--accent2); border: 1px solid #4a1a1a; }
    .form-input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 0.65rem 0.9rem;
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .form-input:focus { border-color: var(--accent); }
    .form-input option { background: var(--surface2); }
    label { font-size: 0.85rem; color: var(--muted); font-weight: 500; display: block; margin-bottom: 0.4rem; }
    .form-group { margin-bottom: 1.2rem; }
    .badge {
      display: inline-block;
      padding: 0.2rem 0.6rem;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 600;
    }
    .badge-movie { background: #1a1a3a; color: #8888ff; }
    .badge-series { background: #1a2a3a; color: #66aaff; }
    .badge-anime { background: #2a1a3a; color: #cc88ff; }
    .badge-book { background: #1a2a1a; color: #88cc88; }
    .badge-game { background: #2a2a1a; color: #cccc66; }
    .status-badge {
      display: inline-block;
      padding: 0.2rem 0.6rem;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 500;
    }
    .status-completed { background: #0d2a1e; color: #66ffaa; }
    .status-watching, .status-reading, .status-playing { background: #1a2a0d; color: #aaff66; }
    .status-dropped { background: #2a0d0d; color: #ff6666; }
    .status-hold { background: #2a2a0d; color: #ffdd66; }
    .status-plan { background: #1a1a2a; color: #aaaaff; }
    .stars { color: #f5c518; letter-spacing: 1px; }
  </style>
  {% block extra_css %}{% endblock %}
</head>
<body>
  {% if user.is_authenticated %}
  <nav>
    <a href="{% url 'dashboard' %}" class="nav-logo">TRAK<span>ORY</span></a>
    <div class="nav-links">
      <a href="{% url 'dashboard' %}">Dashboard</a>
      <a href="{% url 'list' %}">My List</a>
      <a href="{% url 'add' %}">+ Add</a>
      <a href="{% url 'browse' %}">Browse</a>
      <a href="{% url 'stats' %}">Stats</a>
      <a href="{% url 'mood' %}">Mood Pick</a>
      <a href="{% url 'logout' %}" style="color:var(--accent2);">Logout</a>
    </div>
  </nav>
  {% endif %}

  {% if messages %}
  <div class="messages">
    {% for message in messages %}
    <div class="message {{ message.tags }}">{{ message }}</div>
    {% endfor %}
  </div>
  {% endif %}

  {% block content %}{% endblock %}
</body>
</html>
