{% extends 'tracker/base.html' %}
{% block title %}Login — TRAKORY{% endblock %}
{% block extra_css %}
<style>
  .auth-wrapper {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: radial-gradient(ellipse at 60% 40%, #1a1040 0%, var(--bg) 60%);
  }
  .auth-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 2.5rem;
    width: 100%;
    max-width: 420px;
  }
  .auth-title {
    font-family: 'Syne', sans-serif;
    font-size: 2rem;
    font-weight: 800;
    margin-bottom: 0.3rem;
    color: var(--accent);
    letter-spacing: 2px;
  }
  .auth-subtitle { color: var(--muted); margin-bottom: 2rem; font-size: 0.9rem; }
  .auth-footer { margin-top: 1.5rem; text-align: center; font-size: 0.88rem; color: var(--muted); }
  .auth-footer a { color: var(--accent); text-decoration: none; }
  .errorlist { list-style: none; color: var(--accent2); font-size: 0.82rem; margin-top: 0.3rem; }
</style>
{% endblock %}
{% block content %}
<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-title">TRAKORY</div>
    <div class="auth-subtitle">Track everything. Miss nothing.</div>
    <form method="POST">
      {% csrf_token %}
      <div class="form-group">
        <label>Username</label>
        <input type="text" name="username" class="form-input" placeholder="your username" required autofocus>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" class="form-input" placeholder="••••••••" required>
      </div>
      {% if form.errors %}
        <div style="color:var(--accent2);font-size:0.85rem;margin-bottom:1rem;">Invalid username or password.</div>
      {% endif %}
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:0.75rem;">Log In</button>
    </form>
    <div class="auth-footer">
      No account? <a href="{% url 'register' %}">Create one →</a>
    </div>
  </div>
</div>
{% endblock %}
